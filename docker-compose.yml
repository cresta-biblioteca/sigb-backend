version: '3.8'

services:
  # SERVICIO DE APLICACIÓN (PHP + APACHE)
  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: sigb-api-web
    ports:
      - "${APP_PORT:-8080}:80" # Usa puerto del .env o 8080 por defecto
    volumes:
      # Sincronizamos tu carpeta local con el contenedor para desarrollo
      - ./:/var/www/html
    env_file:
      - .env
    environment:
      # ¡CRUCIAL! Apuntar a la carpeta pública, no a la raíz
      - APACHE_DOCUMENT_ROOT=/var/www/html/public
    depends_on:
      - db
    networks:
      - sigb-network

  # SERVICIO DE BASE DE DATOS
  db:
    image: mysql:8.0
    container_name: sigb-api-db
    restart: unless-stopped
    command: --default-authentication-plugin=mysql_native_password
    env_file:
      - .env
    environment:
      # Mapeamos las variables de tu .env a las de MySQL
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD}
      MYSQL_DATABASE: ${DB_DATABASE}
      MYSQL_USER: ${DB_USERNAME}
      MYSQL_PASSWORD: ${DB_PASSWORD}
    ports:
      - "${DB_PORT:-3306}:3306"
    volumes:
      - db_data:/var/lib/mysql
    networks:
      - sigb-network

  # GESTOR DE BASE DE DATOS (PHPMYADMIN)
  phpmyadmin:
    image: phpmyadmin:latest
    container_name: sigb-api-phpmyadmin
    restart: unless-stopped
    ports:
      - "8081:80"
    environment:
      PMA_HOST: db
      PMA_PORT: 3306
      # Usa la misma contraseña del .env
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD}
    depends_on:
      - db
    networks:
      - sigb-network

volumes:
  db_data:
    driver: local

networks:
  sigb-network:
    driver: bridge